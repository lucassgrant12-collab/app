<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attendance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --fg: #000000;
    --muted: #6b6b6b;
    --line: #e2e2e2;
    --hover: #f5f5f5;
    --sel: #000000;
    --sel-fg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button, input, textarea, select {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }
  .hidden { display: none !important; }

  /* ---- Auth screen ---- */
  .auth-wrap {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    width: 100%;
    max-width: 360px;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 32px 28px;
  }
  .auth-card h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .auth-card p.sub { color: var(--muted); font-size: 13px; margin: 4px 0 22px; }
  .auth-card label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
  .auth-card input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 10px 12px;
    border-radius: 8px;
    outline: none;
  }
  .auth-card input:focus { border-color: var(--fg); }
  .auth-actions { display: flex; gap: 8px; margin-top: 22px; }
  .auth-actions .btn { flex: 1; text-align: center; padding: 10px; }
  .auth-msg { font-size: 12px; margin-top: 14px; min-height: 16px; }
  .auth-msg.err { color: #b00020; }
  .auth-msg.ok { color: var(--fg); }

  .btn {
    border: 1px solid var(--fg);
    background: var(--fg);
    color: var(--sel-fg);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    transition: opacity .12s;
  }
  .btn:hover { opacity: .82; }
  .btn.ghost { background: var(--bg); color: var(--fg); }
  .btn.ghost:hover { background: var(--hover); opacity: 1; }
  .btn.sm { padding: 6px 10px; font-size: 13px; }
  .btn:disabled { opacity: .5; cursor: default; }

  /* ---- App layout ---- */
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
  }
  .sidebar {
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar-head {
    padding: 20px;
    border-bottom: 1px solid var(--line);
  }
  .sidebar-head .top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .sidebar-head h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .sidebar-head .who { color: var(--muted); font-size: 11px; margin-top: 3px; word-break: break-all; }
  .add-person {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }
  .add-person input {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 6px;
    outline: none;
  }
  .add-person input:focus { border-color: var(--fg); }

  .people { list-style: none; overflow-y: auto; flex: 1; min-height: 0; }
  .person-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 1px solid var(--line);
  }
  .person-row:hover { background: var(--hover); }
  .person-row.active { background: var(--sel); color: var(--sel-fg); }
  .person-row .name { font-weight: 500; }
  .person-row .count { font-size: 12px; color: var(--muted); }
  .person-row.active .count { color: rgba(255,255,255,.7); }
  .empty { padding: 24px 20px; color: var(--muted); font-size: 13px; }

  .main { overflow-y: auto; min-height: 0; }
  .main-inner { max-width: 720px; padding: 40px 48px; margin: 0 auto; }
  .placeholder {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  .person-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 4px;
  }
  .person-head h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
  .subtle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

  .log-visit {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 28px;
  }
  .log-visit label { font-size: 13px; color: var(--muted); }
  .log-visit input[type="date"],
  .log-visit input[type="text"],
  .log-visit select {
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 6px;
    outline: none;
  }
  .log-visit input[type="date"]:focus,
  .log-visit input[type="text"]:focus,
  .log-visit select:focus { border-color: var(--fg); }
  .log-visit input.time-input { width: 72px; text-align: center; }
  .log-visit select { cursor: pointer; }
  .visit-time { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 10px; }

  .visit { border: 1px solid var(--line); border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
  .visit-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--hover);
  }
  .visit-date { font-weight: 600; letter-spacing: -0.01em; }
  .visit-day { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 8px; }
  .visit-body { padding: 8px 16px 16px; }
  .notes { list-style: none; }
  .note {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .note:last-child { border-bottom: none; }
  .note-text { white-space: pre-wrap; word-break: break-word; }
  .note-time { color: var(--muted); font-size: 11px; white-space: nowrap; margin-top: 2px; }
  .no-notes { color: var(--muted); font-size: 13px; padding: 8px 0; }
  .add-note { display: flex; gap: 8px; margin-top: 10px; }
  .add-note textarea {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 6px;
    outline: none;
    resize: vertical;
    min-height: 38px;
  }
  .add-note textarea:focus { border-color: var(--fg); }

  .icon-btn {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--muted);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .icon-btn:hover { color: var(--fg); background: rgba(0,0,0,.06); }
</style>
</head>
<body>

<!-- ============ Auth screen ============ -->
<div class="auth-wrap" id="authScreen">
  <div class="auth-card">
    <h1>Attendance</h1>
    <p class="sub">Sign in, or create an account to start tracking.</p>
    <form id="authForm" autocomplete="on">
      <label for="authEmail">Email</label>
      <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
      <label for="authPassword">Password</label>
      <input id="authPassword" type="password" autocomplete="current-password" placeholder="••••••••" required />
      <div class="auth-actions">
        <button class="btn" type="submit" id="signInBtn">Sign in</button>
        <button class="btn ghost" type="button" id="signUpBtn">Create account</button>
      </div>
      <div class="auth-msg" id="authMsg"></div>
    </form>
  </div>
</div>

<!-- ============ App ============ -->
<div class="app hidden" id="appScreen">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="top">
        <div>
          <h1>Attendance</h1>
          <div class="who" id="whoAmI"></div>
        </div>
        <button class="btn ghost sm" id="logoutBtn">Log out</button>
      </div>
    </div>
    <form class="add-person" id="addPersonForm">
      <input id="personName" type="text" placeholder="Add a person…" autocomplete="off" />
      <button class="btn" type="submit">Add</button>
    </form>
    <ul class="people" id="peopleList"></ul>
  </aside>

  <main class="main" id="main">
    <div class="placeholder">Select a person, or add one to get started.</div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  "use strict";

  // ============================================================
  //  CONFIG — paste your Supabase project values here.
  //  Find them in: Supabase Dashboard → Project Settings → API
  // ============================================================
  const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";
  // ============================================================

  const $ = id => document.getElementById(id);

  // Guard against missing config so the page fails loudly, not silently.
  if (SUPABASE_URL.includes("YOUR-PROJECT") || SUPABASE_ANON_KEY.includes("YOUR-ANON")) {
    $("authMsg").textContent = "Add your Supabase URL and anon key in index.html (the CONFIG block).";
    $("authMsg").className = "auth-msg err";
    $("signInBtn").disabled = true;
    $("signUpBtn").disabled = true;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let state = { people: [] };
  let selectedId = null;
  let currentUserId = null;

  /* ---------------- Helpers ---------------- */
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function todayISO() {
    const d = new Date();
    return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
  }
  function fmtDate(iso) {
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString(undefined, { month: "long", day: "numeric", year: "numeric" });
  }
  function weekday(iso) {
    const [y, m, d] = iso.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString(undefined, { weekday: "long" });
  }
  function fmtTime(ts) {
    return new Date(ts).toLocaleString(undefined, {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
    });
  }
  // Parse a typed time ("9", "9:30", "930") + AM/PM into canonical 24h "HH:MM".
  function parseClock(text, meridiem) {
    text = (text || "").trim();
    if (!text) return null;
    const m = text.match(/^(\d{1,2})[:.]?(\d{2})?$/);
    if (!m) return null;
    let h = parseInt(m[1], 10);
    const min = m[2] ? parseInt(m[2], 10) : 0;
    if (h < 1 || h > 12 || min > 59) return null;
    let h24 = h % 12;
    if (meridiem === "PM") h24 += 12;
    return String(h24).padStart(2, "0") + ":" + String(min).padStart(2, "0");
  }
  // Format canonical 24h "HH:MM" for display as "9:30 AM".
  function fmtClock(t) {
    if (!t) return "";
    const [h, m] = t.split(":").map(Number);
    const mer = h >= 12 ? "PM" : "AM";
    let h12 = h % 12;
    if (h12 === 0) h12 = 12;
    return h12 + ":" + String(m).padStart(2, "0") + " " + mer;
  }
  function nowClock() {
    const d = new Date();
    const h = d.getHours();
    const mer = h >= 12 ? "PM" : "AM";
    let h12 = h % 12;
    if (h12 === 0) h12 = 12;
    return { text: h12 + ":" + String(d.getMinutes()).padStart(2, "0"), meridiem: mer };
  }
  function getPerson(id) { return state.people.find(p => p.id === id); }

  /* ---------------- Data (Supabase) ---------------- */
  async function loadData() {
    const { data, error } = await sb
      .from("people")
      .select("id, name, visits ( id, date, time24, notes ( id, text, ts:created_at ) )");
    if (error) {
      console.error(error);
      alert("Could not load your data: " + error.message);
      state = { people: [] };
      return;
    }
    state = {
      people: (data || []).map(p => ({
        id: p.id,
        name: p.name,
        visits: (p.visits || []).map(v => ({
          id: v.id, date: v.date, time24: v.time24,
          notes: (v.notes || []).map(n => ({ id: n.id, text: n.text, ts: n.ts }))
        }))
      }))
    };
  }

  async function addPerson(name) {
    name = name.trim();
    if (!name) return;
    const { data, error } = await sb.from("people").insert({ name }).select("id, name").single();
    if (error) return alert(error.message);
    state.people.push({ id: data.id, name: data.name, visits: [] });
    selectPerson(data.id);
  }
  async function deletePerson(id) {
    const p = getPerson(id);
    if (!p) return;
    if (!confirm(`Delete ${p.name} and all their visits?`)) return;
    const { error } = await sb.from("people").delete().eq("id", id);
    if (error) return alert(error.message);
    state.people = state.people.filter(x => x.id !== id);
    if (selectedId === id) selectedId = null;
    renderPeople();
    renderMain();
  }
  async function addVisit(personId, date, time24) {
    if (!date || !time24) return;
    const p = getPerson(personId);
    if (!p) return;
    if (p.visits.some(v => v.date === date && v.time24 === time24)) return; // exact duplicate
    const { data, error } = await sb.from("visits")
      .insert({ person_id: personId, date, time24 }).select("id, date, time24").single();
    if (error) return alert(error.message);
    p.visits.push({ id: data.id, date: data.date, time24: data.time24, notes: [] });
    renderPeople();
    renderMain();
  }
  async function deleteVisit(personId, visitId) {
    const p = getPerson(personId);
    if (!p) return;
    const { error } = await sb.from("visits").delete().eq("id", visitId);
    if (error) return alert(error.message);
    p.visits = p.visits.filter(v => v.id !== visitId);
    renderPeople();
    renderMain();
  }
  async function addNote(personId, visitId, text) {
    text = text.trim();
    if (!text) return;
    const p = getPerson(personId);
    const v = p && p.visits.find(v => v.id === visitId);
    if (!v) return;
    const { data, error } = await sb.from("notes")
      .insert({ visit_id: visitId, text }).select("id, text, ts:created_at").single();
    if (error) return alert(error.message);
    v.notes.push({ id: data.id, text: data.text, ts: data.ts });
    renderMain();
  }
  async function deleteNote(personId, visitId, noteId) {
    const p = getPerson(personId);
    const v = p && p.visits.find(v => v.id === visitId);
    if (!v) return;
    const { error } = await sb.from("notes").delete().eq("id", noteId);
    if (error) return alert(error.message);
    v.notes = v.notes.filter(n => n.id !== noteId);
    renderMain();
  }

  /* ---------------- Render ---------------- */
  function renderPeople() {
    const list = $("peopleList");
    if (!state.people.length) {
      list.innerHTML = '<li class="empty">No people yet.</li>';
      return;
    }
    const sorted = [...state.people].sort((a, b) =>
      a.name.localeCompare(b.name, undefined, { sensitivity: "base" }));
    list.innerHTML = sorted.map(p => `
      <li class="person-row ${p.id === selectedId ? "active" : ""}" data-id="${p.id}">
        <span class="name">${esc(p.name)}</span>
        <span class="count">${p.visits.length} visit${p.visits.length === 1 ? "" : "s"}</span>
      </li>`).join("");
    list.querySelectorAll(".person-row").forEach(row =>
      row.addEventListener("click", () => selectPerson(row.dataset.id)));
  }

  function selectPerson(id) {
    selectedId = id;
    renderPeople();
    renderMain();
  }

  function renderMain() {
    const main = $("main");
    const person = getPerson(selectedId);
    if (!person) {
      main.innerHTML = '<div class="placeholder">Select a person, or add one to get started.</div>';
      return;
    }
    const visits = [...person.visits].sort((a, b) =>
      b.date.localeCompare(a.date) || (b.time24 || "").localeCompare(a.time24 || ""));
    const totalNotes = person.visits.reduce((n, v) => n + v.notes.length, 0);
    const now = nowClock();

    main.innerHTML = `
      <div class="main-inner">
        <div class="person-head">
          <h2>${esc(person.name)}</h2>
          <button class="icon-btn" id="deletePerson">Delete person</button>
        </div>
        <div class="subtle">${person.visits.length} visit${person.visits.length === 1 ? "" : "s"} · ${totalNotes} note${totalNotes === 1 ? "" : "s"}</div>

        <form class="log-visit" id="logVisitForm">
          <label for="visitDate">Log a visit</label>
          <input type="date" id="visitDate" value="${todayISO()}" max="${todayISO()}" />
          <input type="text" id="visitTime" class="time-input" placeholder="9:30"
                 value="${now.text}" inputmode="numeric" autocomplete="off" aria-label="Time" />
          <select id="visitMeridiem" aria-label="AM or PM">
            <option value="AM" ${now.meridiem === "AM" ? "selected" : ""}>AM</option>
            <option value="PM" ${now.meridiem === "PM" ? "selected" : ""}>PM</option>
          </select>
          <button class="btn sm" type="submit">Add visit</button>
        </form>

        <div id="visits">
          ${visits.length ? visits.map(v => renderVisit(v)).join("") :
            '<div class="empty" style="padding-left:0">No visits logged yet.</div>'}
        </div>
      </div>`;

    $("deletePerson").addEventListener("click", () => deletePerson(person.id));
    $("logVisitForm").addEventListener("submit", e => {
      e.preventDefault();
      const date = $("visitDate").value;
      const timeInput = $("visitTime");
      const time24 = parseClock(timeInput.value, $("visitMeridiem").value);
      if (!time24) {
        timeInput.focus();
        timeInput.select();
        alert("Enter a time like 9 or 9:30, then pick AM or PM.");
        return;
      }
      addVisit(person.id, date, time24);
    });
    main.querySelectorAll("[data-del-visit]").forEach(btn =>
      btn.addEventListener("click", () => deleteVisit(person.id, btn.dataset.delVisit)));
    main.querySelectorAll("[data-del-note]").forEach(btn =>
      btn.addEventListener("click", () => deleteNote(person.id, btn.dataset.visit, btn.dataset.delNote)));
    main.querySelectorAll(".add-note").forEach(form =>
      form.addEventListener("submit", e => {
        e.preventDefault();
        const ta = form.querySelector("textarea");
        addNote(person.id, form.dataset.visit, ta.value);
      }));
  }

  function renderVisit(v) {
    const notes = [...v.notes].sort((a, b) => new Date(a.ts) - new Date(b.ts));
    return `
      <div class="visit">
        <div class="visit-head">
          <div class="visit-date">${fmtDate(v.date)}<span class="visit-day">${weekday(v.date)}</span>${v.time24 ? `<span class="visit-time">${fmtClock(v.time24)}</span>` : ""}</div>
          <button class="icon-btn" data-del-visit="${v.id}">Remove</button>
        </div>
        <div class="visit-body">
          <ul class="notes">
            ${notes.length ? notes.map(n => `
              <li class="note">
                <span class="note-text">${esc(n.text)}</span>
                <span style="display:flex;gap:8px;align-items:flex-start">
                  <span class="note-time">${fmtTime(n.ts)}</span>
                  <button class="icon-btn" data-del-note="${n.id}" data-visit="${v.id}">✕</button>
                </span>
              </li>`).join("") :
              '<li class="no-notes">No notes for this visit.</li>'}
          </ul>
          <form class="add-note" data-visit="${v.id}">
            <textarea rows="1" placeholder="Add a note…"></textarea>
            <button class="btn sm ghost" type="submit">Save</button>
          </form>
        </div>
      </div>`;
  }

  /* ---------------- Auth ---------------- */
  function showAuth() {
    $("appScreen").classList.add("hidden");
    $("authScreen").classList.remove("hidden");
  }
  async function enterApp(session) {
    $("authScreen").classList.add("hidden");
    $("appScreen").classList.remove("hidden");
    $("whoAmI").textContent = session.user.email || "";
    await loadData();
    renderPeople();
    renderMain();
  }
  function handleSession(session) {
    const uidNow = session && session.user ? session.user.id : null;
    if (uidNow && uidNow !== currentUserId) {
      currentUserId = uidNow;
      enterApp(session);
    } else if (!uidNow && currentUserId) {
      currentUserId = null;
      selectedId = null;
      state = { people: [] };
      showAuth();
    }
  }

  function setMsg(text, kind) {
    const el = $("authMsg");
    el.textContent = text || "";
    el.className = "auth-msg" + (kind ? " " + kind : "");
  }

  $("authForm").addEventListener("submit", async e => {
    e.preventDefault();
    setMsg("Signing in…");
    const email = $("authEmail").value.trim();
    const password = $("authPassword").value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) setMsg(error.message, "err");
    else setMsg("");
  });

  $("signUpBtn").addEventListener("click", async () => {
    const email = $("authEmail").value.trim();
    const password = $("authPassword").value;
    if (!email || !password) { setMsg("Enter an email and password first.", "err"); return; }
    setMsg("Creating account…");
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) { setMsg(error.message, "err"); return; }
    if (data.session) setMsg("");                    // logged straight in
    else setMsg("Account created — check your email to confirm, then sign in.", "ok");
  });

  $("logoutBtn").addEventListener("click", async () => {
    await sb.auth.signOut();
  });

  $("addPersonForm").addEventListener("submit", e => {
    e.preventDefault();
    const input = $("personName");
    addPerson(input.value);
    input.value = "";
    input.focus();
  });

  /* ---------------- Init ---------------- */
  sb.auth.getSession().then(({ data }) => handleSession(data.session));
  sb.auth.onAuthStateChange((_event, session) => handleSession(session));
})();
</script>
</body>
